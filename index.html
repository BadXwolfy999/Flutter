<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Contact Manager</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-address-book"></i> Bulk Contact Manager</h1>
            <p>Easily add multiple contacts at once</p>
        </header>

        <main>
            <div class="input-section">
                <div class="tabs">
                    <button class="tab-btn active" data-tab="csv-tab">CSV Upload</button>
                    <button class="tab-btn" data-tab="manual-tab">Manual Entry</button>
                </div>

                <div class="tab-content">
                    <div id="csv-tab" class="tab-pane active">
                        <div class="file-upload">
                            <div class="file-upload-area">
                                <i class="fas fa-file-csv"></i>
                                <p>Drag & drop your CSV file here or</p>
                                <label for="csv-file" class="file-label">Browse Files</label>
                                <input type="file" id="csv-file" accept=".csv" hidden>
                            </div>
                            <div class="file-info" id="file-info">
                                <p>No file selected</p>
                            </div>
                        </div>
                        <div class="template-section">
                            <a href="#" id="download-template">Download CSV Template</a>
                        </div>
                    </div>

                    <div id="manual-tab" class="tab-pane">
                        <div class="manual-entry">
                            <div id="contacts-container">
                                <div class="contact-entry">
                                    <div class="form-group">
                                        <label for="name-1">Name</label>
                                        <input type="text" id="name-1" class="contact-name" placeholder="Full Name">
                                    </div>
                                    <div class="form-group">
                                        <label for="email-1">Email</label>
                                        <input type="email" id="email-1" class="contact-email" placeholder="Email Address">
                                    </div>
                                    <div class="form-group">
                                        <label for="phone-1">Phone</label>
                                        <input type="tel" id="phone-1" class="contact-phone" placeholder="Phone Number">
                                    </div>
                                    <div class="form-group">
                                        <label for="group-1">Group</label>
                                        <input type="text" id="group-1" class="contact-group" placeholder="Group/Category">
                                    </div>
                                </div>
                            </div>
                            <button id="add-more" class="btn-secondary"><i class="fas fa-plus"></i> Add Another Contact</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="preview-section">
                <h2>Preview Contacts</h2>
                <div class="preview-controls">
                    <div class="search-box">
                        <input type="text" id="search-contacts" placeholder="Search contacts...">
                        <i class="fas fa-search"></i>
                    </div>
                    <div class="filter-box">
                        <select id="filter-group">
                            <option value="">All Groups</option>
                        </select>
                    </div>
                </div>
                <div class="contacts-table-container">
                    <table id="contacts-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Group</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="contacts-list">
                            <!-- Contacts will be displayed here -->
                            <tr class="empty-state">
                                <td colspan="5">
                                    <div class="empty-message">
                                        <i class="fas fa-users-slash"></i>
                                        <p>No contacts added yet</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="action-buttons">
                <button id="clear-all" class="btn-danger"><i class="fas fa-trash"></i> Clear All</button>
                <button id="save-contacts" class="btn-primary"><i class="fas fa-save"></i> Save Contacts</button>
            </div>
        </main>

        <div id="notification" class="notification">
            <span id="notification-message"></span>
            <button id="close-notification"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
